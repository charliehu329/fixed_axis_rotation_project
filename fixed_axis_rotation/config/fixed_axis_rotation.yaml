# fixed_axis_rotation.yaml
#
# 功能：
#     配置 Franka FR3 固定空间轴旋转控制系统。
#
# 节点：
#     1. fixed_axis_rotation_node
#        计算末端固定轴旋转速度，并转换为关节速度。
#
#     2. fixed_axis_keyboard_node
#        接收键盘输入并发布控制命令。
#
# 说明：
#     初次真机测试必须保持 dry_run: true。
#
#     axis_point_link8 和 axis_direction_link8
#     均在初始 fr3_link8 坐标系中定义。
#
# 重点修改
# axis_point_link8:
# axis_direction_link8:
# urdf_path:


fixed_axis_rotation_node:
  ros__parameters:

    # ========================================================
    # 运动学模型
    # ========================================================

    # 必须是已经展开完成的 URDF 文件，
    # 不能直接填写 xacro 文件。
    urdf_path: /home/harry/franka_ros2_ws/src/fixed_axis_rotation_project/fixed_axis_rotation/config/urdf/fr3.urdf

    # 固定轴旋转所控制的末端坐标系。
    end_effector_frame: "fr3_link8"

    # ========================================================
    # ROS 2 Topic
    # ========================================================

    # Franka 当前关节状态。
    joint_state_topic: "/franka/joint_states"

    # 键盘节点发布的固定轴控制命令。
    command_topic: "/fixed_axis_rotation/command"

    # Franka 底层关节速度控制器指令。
    joint_velocity_command_topic: "/joint_velocity_example_controller/commands"

    # ========================================================
    # 固定轴定义
    # ========================================================

    # 固定轴上一点在初始 fr3_link8 坐标系中的位置。
    #
    # 单位：
    #     m
    #
    # 当前默认值表示固定轴经过 link8 原点。
    # 后续需要根据实际安装结构修改。
    axis_point_link8:
      - 0.0
      - 0.0
      - 0.0

    # 固定轴方向在初始 fr3_link8 坐标系中的表达。
    #
    # 节点启动时会自动归一化。
    #
    # 当前默认值表示沿 link8 的正 Z 方向。
    axis_direction_link8:
      - 0.0
      - 0.0
      - 1.0

    # 第一次收到有效关节状态时，
    # 自动记录固定轴和初始末端位姿。
    capture_axis_on_start: true

    # ========================================================
    # 控制参数
    # ========================================================

    # 主控制循环频率。
    publish_rate_hz: 100.0

    # 阻尼最小二乘伪逆阻尼因子。
    damping: 0.01

    # 角速度最大变化率。
    # 单位：rad/s^2
    max_angular_acceleration: 0.05

    # 位置误差反馈增益。
    # 输出线速度约为：
    # v_feedback = position_gain * position_error
    position_gain: 1.0

    # 姿态误差反馈增益。
    angular_gain: 1.0

    # 0 表示不限制控制持续时间。
    duration_sec: 0.0

    # ========================================================
    # 速度限制
    # ========================================================

    # 单个关节最大速度绝对值。
    # 初次真机测试使用较小值。
    # 单位：rad/s
    max_joint_velocity: 0.05

    # 末端最大线速度模长。
    # 单位：m/s
    max_linear_velocity: 0.05

    # 末端最大角速度模长。
    # 单位：rad/s
    max_angular_velocity: 0.05

    # ========================================================
    # 安全限制
    # ========================================================

    # 关节位置距离上下限的安全余量。
    # 单位：rad
    joint_position_margin: 0.15

    # 雅可比矩阵允许的最小奇异值。
    min_jacobian_singular_value: 0.01

    # 雅可比矩阵允许的最大条件数。
    max_jacobian_condition_number: 300.0

    # 允许的最大末端位置跟踪误差。
    # 超过后立即停止。
    # 单位：m
    max_position_error: 0.05

    # 允许的最大末端姿态跟踪误差。
    # 超过后立即停止。
    # 单位：rad
    max_orientation_error: 0.30

    # 超过该时间没有收到关节状态，
    # 立即发送零关节速度。
    # 单位：s
    joint_state_timeout_sec: 0.10

    # 超过该时间没有收到键盘控制命令，
    # 立即发送零关节速度。
    # 单位：s
    command_timeout_sec: 0.50

    # 小于该值的角速度认为已经停止。
    # 单位：rad/s
    angular_speed_zero_threshold: 0.0001

    # ========================================================
    # 运行模式
    # ========================================================

    # true：
    #     只进行计算和日志输出，
    #     不向机器人发布关节速度。
    #
    # false：
    #     向真实底层控制器发布关节速度。
    #
    # 初次测试必须保持 true。
    dry_run: true

    # 日志打印周期。
    # 单位：s
    log_period_sec: 5.0


fixed_axis_keyboard_node:
  ros__parameters:

    # ========================================================
    # ROS 2 Topic
    # ========================================================

    command_topic: "/fixed_axis_rotation/command"

    # ========================================================
    # 键盘控制参数
    # ========================================================

    # 命令心跳发布频率。
    publish_rate_hz: 20.0

    # 按 W 且当前速度为零时使用的初始角速度。
    # 单位：rad/s
    default_angular_speed: 0.02

    # 每次按 D/A 或 +/- 时的角速度变化量。
    # 单位：rad/s
    angular_speed_step: 0.005

    # 键盘允许设置的最大角速度。
    # 必须不超过主节点的 max_angular_velocity。
    # 单位：rad/s
    max_angular_speed: 0.05